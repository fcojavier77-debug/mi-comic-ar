<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="miVideo" src="./animacion.mp4" preload="auto" loop="true" muted crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-video src="#miVideo" width="1" height="1" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      // Este script detecta cuando el móvil ve la viñeta para darle al "Play"
      const video = document.querySelector('#miVideo');
      const targetEntity = document.querySelector('#target');
      
      targetEntity.addEventListener("targetFound", event => {
        console.log("Viñeta detectada");
        video.play();
      });

      targetEntity.addEventListener("targetLost", event => {
        console.log("Viñeta perdida");
        video.pause();
      });
    </script>
  </body>
</html>
