<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.001; filterBeta: 0.01;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="animacion.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

      <a-entity id="mytarget" mindar-image-target="targetIndex: 0">
        <a-video id="video-obj" src="#vid" width="1" height="1" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector("#vid");
      const target = document.querySelector("#mytarget");

      // Forzamos la reproducción al detectar la imagen
      target.addEventListener("targetFound", () => {
        console.log("Imagen detectada");
        video.play().catch(e => console.log("Error al reproducir:", e));
      });

      target.addEventListener("targetLost", () => {
        video.pause();
      });

      // TRUCO: Si tocas la pantalla, el vídeo intenta reproducirse (desbloqueo manual)
      window.addEventListener("click", () => {
        video.play();
        console.log("Clic detectado, intentando reproducir vídeo...");
      });
    </script>
  </body>
</html>
