<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background: #000; }
      #debug { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 10px; z-index: 9999; font-family: sans-serif; border-radius: 5px; pointer-events: none; font-size: 11px; }
      .a-enter-vr { display: none !important; }
    </style>
  </head>
  <body>
    <div id="debug">Toca la pantalla para activar</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="animacion.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-plane 
          material="src: #vid; shader: flat; repeat: 1 0.7; offset: 0 0.15" 
          position="0.1 0 0.1" 
          width="2.2" 
          height="1.0" 
          scale="0.6 0.6 1">
        </a-plane>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector("#vid");
      const target = document.querySelector("#target");
      const debug = document.querySelector("#debug");

      const forcePlay = () => {
        video.play().then(() => {
          debug.innerText = "Vídeo en marcha. Apunta al dibujo.";
        }).catch(() => {});
      };

      window.addEventListener("click", forcePlay);
      window.addEventListener("touchstart", forcePlay);

      target.addEventListener("targetFound", () => {
        debug.style.background = "green";
        debug.innerText = "¡DETECTADO!";
        forcePlay(); 
      });
    </script>
  </body>
</html>
