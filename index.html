<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: https://fcojavier77-debug.github.io/mi-comic-ar/targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="https://fcojavier77-debug.github.io/mi-comic-ar/animacion.mp4" 
               preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-video src="#vid" width="1.5" height="1" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      // Forzamos el arranque del vídeo al tocar cualquier parte de la pantalla
      const video = document.querySelector("#vid");
      const target = document.querySelector("#target");

      window.addEventListener("click", () => {
        video.play();
        console.log("Vídeo activado manualmente");
      });

      target.addEventListener("targetFound", () => {
        video.play();
        console.log("¡Imagen detectada!");
      });

      target.addEventListener("targetLost", () => {
        video.pause();
      });
    </script>
  </body>
</html>
