<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background-color: black; }
      #debug { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 10px; z-index: 9999; font-family: sans-serif; border-radius: 5px; pointer-events: none; }
      .a-enter-vr { display: none !important; }
    </style>

    <script>
      // Este componente obliga al WebP a moverse "despertando" a la GPU
      AFRAME.registerComponent('descongelar', {
        tick: function (time, timeDelta) {
          const mesh = this.el.getObject3D('mesh');
          if (mesh && mesh.material && mesh.material.map) {
            // Truco 1: Forzar actualización de mapa
            mesh.material.map.needsUpdate = true;
            // Truco 2: Micro-movimiento invisible para forzar el renderizado
            const scale = 1 + Math.sin(time / 1000) * 0.001;
            this.el.setAttribute('scale', {x: scale, y: scale, z: 1});
          }
        }
      });
    </script>
  </head>
  
  <body>
    <div id="debug">Buscando dibujo...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights">
      
      <a-assets>
        <img id="webpAnim" src="animacion.webp" crossorigin="anonymous">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-image src="#webpAnim" position="0 0 0.1" width="1.2" height="1.2" descongelar></a-image>
      </a-entity>
    </a-scene>

    <script>
      const target = document.querySelector("#target");
      const debug = document.querySelector("#debug");

      target.addEventListener("targetFound", () => {
        debug.style.background = "green";
        debug.innerText = "¡DETECTADO! Moviendo...";
      });

      target.addEventListener("targetLost", () => {
        debug.style.background = "rgba(0,0,0,0.8)";
        debug.innerText = "Enfoca la viñeta";
      });
    </script>
  </body>
</html>
