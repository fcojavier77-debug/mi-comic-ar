<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* Forzamos que todo ocupe el 100% de la pantalla */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      /* El canvas de la cámara debe ser absoluto y total */
      a-scene {
        width: 100vw;
        height: 100vh;
      }
      #debug { 
        position: fixed; 
        top: 10px; 
        left: 10px; 
        background: rgba(0,0,0,0.7); 
        color: white; 
        padding: 8px; 
        z-index: 9999; 
        font-family: sans-serif; 
        font-size: 11px; 
        border-radius: 4px;
      }
      .a-enter-vr { display: none !important; }
    </style>

    <script>
      AFRAME.registerComponent('webp-fix', {
        tick: function () {
          const mesh = this.el.getObject3D('mesh');
          if (mesh && mesh.material && mesh.material.map) {
            mesh.material.map.needsUpdate = true;
          }
        }
      });
    </script>
  </head>
  
  <body>
    <div id="debug">Iniciando Realidad Aumentada...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no; filterMinCF:0.0001; filterBeta: 0.001;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights">
      
      <a-assets>
        <img id="webpAnim" src="animacion.webp" crossorigin="anonymous">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-image src="#webpAnim" width="1" height="1" position="0 0 0" webp-fix></a-image>
      </a-entity>
    </a-scene>

    <script>
      const target = document.querySelector("#target");
      const debug = document.querySelector("#debug");

      target.addEventListener("targetFound", () => {
        debug.style.background = "green";
        debug.innerText = "¡DETECTADO!";
      });

      target.addEventListener("targetLost", () => {
        debug.style.background = "rgba(0,0,0,0.7)";
        debug.innerText = "Apunta a la viñeta";
      });
    </script>
  </body>
</html>
