<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background: #000; }
      #debug { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 10px; z-index: 9999; font-family: sans-serif; border-radius: 5px; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="debug">Toca la pantalla una vez al cargar</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="animacion.mp4" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-video src="#vid" position="0 0 0.1" width="1" height="1"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector("#vid");
      const target = document.querySelector("#target");
      const debug = document.querySelector("#debug");

      // CRÍTICO: Los móviles bloquean videos hasta que el usuario toca la pantalla
      window.addEventListener("click", () => { 
        video.play(); 
        debug.innerText = "Vídeo desbloqueado. Apunta al dibujo.";
      });

      target.addEventListener("targetFound", () => {
        debug.style.background = "green";
        debug.innerText = "¡DETECTADO! Reproduciendo vídeo...";
        video.play();
      });

      target.addEventListener("targetLost", () => {
        debug.style.background = "rgba(0,0,0,0.8)";
        debug.innerText = "Enfoca la viñeta";
      });
    </script>
  </body>
</html>
