<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background: #000; }
      .a-enter-vr { display: none !important; }
    </style>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind?v=2; autoStart: true; uiScanning: no;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid1" src="animacion.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
        <video id="vid2" src="animacion2.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target1" mindar-image-target="targetIndex: 0">
        <a-plane 
          material="src: #vid1; shader: flat; repeat: 1 0.75; offset: 0 0.12" 
          position="-0.1 0 0.1" 
          width="1.8" 
          height="1.0" 
          scale="0.6 0.6 1">
        </a-plane>
      </a-entity>

<a-entity id="target2" mindar-image-target="targetIndex: 1">
  <a-plane 
    material="shader: chromakey; src: #vid2; color: 0 1 0; transparent: true; repeat: 0.65 1; offset: 0.175 0" 
    position="0.1 0 0.01" 
    rotation="0 0 0" 
    width="0.8" 
    height="1.0" 
    scale="1.6 1.6 1">
  </a-plane>
</a-entity>
    <script>
      const v1 = document.querySelector("#vid1");
      const v2 = document.querySelector("#vid2");

      const forcePlay = () => {
        v1.play().catch(() => {});
        v2.play().catch(() => {});
      };

      window.addEventListener("click", forcePlay);
      window.addEventListener("touchstart", forcePlay);

      // Activar al detectar cualquier dibujo
      document.querySelector("#target1").addEventListener("targetFound", forcePlay);
      document.querySelector("#target2").addEventListener("targetFound", forcePlay);
    </script>
  </body>
</html>
