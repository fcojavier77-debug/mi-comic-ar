<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      .a-enter-vr { display: none; }
    </style>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      embedded>
      
      <a-assets>
        <video id="peli" src="animacion.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera look-controls="enabled: false"></a-camera>

      <a-entity id="disparador" mindar-image-target="targetIndex: 0">
        <a-video src="#peli" width="1" height="1" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.getElementById('peli');
      const target = document.getElementById('disparador');

      // ORDEN DIRECTA: En cuanto detecte, PLAY.
      target.addEventListener("targetFound", () => {
        video.play();
      });

      target.addEventListener("targetLost", () => {
        video.pause();
      });

      // DESBLOQUEO OBLIGATORIO: Toca la pantalla una vez al cargar la cámara
      window.addEventListener("click", () => {
        video.play();
        video.pause();
      });
    </script>
  </body>
</html>
