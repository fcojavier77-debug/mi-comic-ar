<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      /* Esto quita cualquier interfaz de VR que se cuele */
      .a-enter-vr { display: none !important; }
    </style>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      embedded>
      
      <a-assets>
        <video id="vid" src="animacion.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-video src="#vid" width="1" height="1" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector("#vid");
      const target = document.querySelector("#target");

      // Al detectar la imagen, play. Al perderla, pausa.
      target.addEventListener("targetFound", () => {
        video.play();
      });
      target.addEventListener("targetLost", () => {
        video.pause();
      });

      // Toque manual para "desbloquear" el vídeo en el navegador
      window.addEventListener("click", () => {
        video.play();
        console.log("Vídeo desbloqueado");
      });
    </script>
  </body>
</html>
